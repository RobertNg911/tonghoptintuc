name: TongHopTinTuc Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:
    inputs:
      category:
        type: choice
        options:
          - world
          - tech

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install axios xml2js
        
      - name: Report install result
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "✅ Install dependencies done"
        continue-on-error: true
      
      - name: Determine category
        id: category
        run: |
          if [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "CATEGORY=tech" >> $GITHUB_ENV
          else
            echo "CATEGORY=world" >> $GITHUB_ENV
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CATEGORY=${{ github.event.inputs.category }}" >> $GITHUB_ENV
          fi
      
      - name: Fetch feeds
        run: node fetch-news.js
        continue-on-error: true
        
      - name: Check fetch result
        run: |
          if [ -f news.json ]; then
            COUNT=$(node -e "console.log(require('./news.json').length)")
            echo "✅ Fetched $COUNT news"
            if [ "$COUNT" = "0" ]; then
              echo "::warning::No news fetched"
            fi
          else
            echo "::error::No news.json file created"
            exit 1
          fi
        continue-on-error: true
      
      - name: Generate content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node generate.js
        continue-on-error: true

      - name: Check generate result
        run: |
          if [ -f content.txt ]; then
            echo "✅ Content generated"
          else
            echo "::error::No content.txt - AI failed"
            exit 1
          fi
        continue-on-error: true

      - name: Generate image
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node gen-image.js
        continue-on-error: true

      - name: Check image result
        run: |
          if [ -f image.png ]; then
            echo "✅ Image generated"
          else
            echo "⚠️ No image - posting text only"
          fi
        continue-on-error: true
      
      - name: Post to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          IMAGE_FILE: image.png
        run: node post.js
        continue-on-error: true
        
      - name: Report result to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            CONTENT=$(cat content.txt 2>/dev/null | head -c 300 || echo "No content")
            CATEGORY=$CATEGORY
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=🔥 *TongHopTinTuc* - $CATEGORY%0A$CONTENT..." \
              -d "parse_mode=Markdown" || true
          fi
        
      - name: Report failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=❌ *TongHopTinTuc LỖI*%0ACategory: $CATEGORY%0ACheck logs at GitHub" \
              -d "parse_mode=Markdown" || true
          fi