name: TongHopTinTuc Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:
    inputs:
      category:
        type: choice
        options:
          - world
          - tech

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install axios xml2js
      
      - name: Determine category
        id: category
        run: |
          if [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "CATEGORY=tech" >> $GITHUB_ENV
          else
            echo "CATEGORY=world" >> $GITHUB_ENV
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CATEGORY=${{ github.event.inputs.category }}" >> $GITHUB_ENV
          fi
      
      - name: Fetch feeds
        run: node fetch-news.js
      
      - name: Generate content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node generate.js
      
      - name: Post to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: node post.js
      
      - name: Report success to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            CONTENT=$(cat content.txt | head -c 200)
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=✅ *TongHopTinTuc* - $CATEGORY posted! %0A$CONTENT..." \
              -d "parse_mode=Markdown"
          fi
      
      - name: Report failure to Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=❌ *TongHopTinTuc LỖI*%0ACategory: $CATEGORY%0ACheck logs!" \
              -d "parse_mode=Markdown"
          fi