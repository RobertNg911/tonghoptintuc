name: TongHopTinTuc Cron

on:
  schedule:
    # World: Phút 0 mỗi giờ UTC = 7h sáng VN
    - cron: '0 * * * *'
    # Tech: Phút 30 mỗi giờ UTC = 7h30 sáng VN
    - cron: '30 * * * *'
  # Chạy thủ công
  workflow_dispatch:
    inputs:
      category:
        description: 'Loại tin tức'
        required: true
        default: 'world'
        type: choice
        options:
          - world
          - tech

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Gọi Worker API
        run: |
          if [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            CATEGORY="tech"
          else
            CATEGORY="world"
          fi
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CATEGORY="${{ github.event.inputs.category }}"
          fi
          
          echo "Running $CATEGORY news..."
          curl -X POST "https://tonghoptintuc.leesun190590.workers.dev/run" \
            -H "Content-Type: application/json" \
            -d "{\"category\":\"$CATEGORY\"}" \
            -w "\nHTTP Status: %{http_code}\n"
          
          echo "Done at $(date)"