name: TongHopTinTuc Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # World news: every 15 minutes (0, 15, 30, 45)
    - cron: '*/15 * * * *'
    # Tech news: every 15 minutes offset by 7 (7, 22, 37, 52)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
    inputs:
      category:
        type: choice
        options:
          - world
          - tech

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install axios xml2js form-data
      
      - name: Determine category
        run: |
          SCHEDULE_EXPR="${{ github.event.schedule }}"
          if [[ "$SCHEDULE_EXPR" == "7,22,37,52 * * * *" ]]; then
            echo "CATEGORY=tech" >> $GITHUB_ENV
          else
            echo "CATEGORY=world" >> $GITHUB_ENV
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CATEGORY=${{ github.event.inputs.category }}" >> $GITHUB_ENV
          fi
          echo "Running $CATEGORY pipeline..."
      
      - name: Fetch and rank top 1 news
        run: node fetch-news.js
      
      - name: Generate content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_COUNT: 1
        run: |
          node generate.js
          echo "Content files:"
          ls -la content-*.txt 2>/dev/null || echo "No content files"
      
      - name: Generate image
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IMAGE_COUNT: 1
        run: |
          node gen-image.js
          if [ ! -f "image-1.png" ]; then
            echo "❌ No image generated - image-1.png missing"
            exit 1
          fi
          echo "✅ Image generated: $(ls -la image-1.png)"
       
      - name: Post to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULED_MINUTES: 0
        run: node post.js
        continue-on-error: true

      - name: Report failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=❌ *TongHopTinTuc LỖI*%0ACategory: $CATEGORY%0ACheck logs at GitHub" \
              -d "parse_mode=Markdown" || true
          fi