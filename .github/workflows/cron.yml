name: TongHopTinTuc Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch:
    inputs:
      category:
        type: choice
        options:
          - world
          - tech

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install axios xml2js form-data
      
      - name: Determine category
        run: |
          if [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "CATEGORY=tech" >> $GITHUB_ENV
          else
            echo "CATEGORY=world" >> $GITHUB_ENV
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CATEGORY=${{ github.event.inputs.category }}" >> $GITHUB_ENV
          fi
          echo "Running $CATEGORY pipeline..."
      
      - name: Fetch and rank news
        run: node fetch-news.js
      
      - name: Generate 5 contents
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_COUNT: 5
        run: |
          node generate.js
          echo "Content files:"
          ls -la content-*.txt 2>/dev/null || echo "No content files"
      
      - name: Generate 5 images
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IMAGE_COUNT: 5
        run: node gen-image.js
      
      - name: Post 1 of 5
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULE_INDEX: 0
          SCHEDULED_MINUTES: 0
        run: node post.js
        continue-on-error: true
      
      - name: Post 2 of 5
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULE_INDEX: 1
          SCHEDULED_MINUTES: 15
        run: node post.js
        continue-on-error: true
      
      - name: Post 3 of 5
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULE_INDEX: 2
          SCHEDULED_MINUTES: 30
        run: node post.js
        continue-on-error: true
      
      - name: Post 4 of 5
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULE_INDEX: 3
          SCHEDULED_MINUTES: 45
        run: node post.js
        continue-on-error: true
      
      - name: Post 5 of 5
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
          SCHEDULE_INDEX: 4
          SCHEDULED_MINUTES: 60
        run: node post.js
        continue-on-error: true

      - name: Report failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_ID" \
              -d "text=❌ *TongHopTinTuc LỖI*%0ACategory: $CATEGORY%0ACheck logs at GitHub" \
              -d "parse_mode=Markdown" || true
          fi